name: Container Registry GHCR
"on":
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build-and-push-image:
    name: Push container to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=edge
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
      - name: Get version info
        id: version
        run: |
          echo "version=$(git describe --tags --always --abbrev=7)" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --verify HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BININFO_VERSION=${{ steps.version.outputs.version }}
            BININFO_COMMIT_HASH=${{ steps.version.outputs.commit }}
            BININFO_BUILD_DATE=${{ steps.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
