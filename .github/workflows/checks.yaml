name: Checks
"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'
  workflow_dispatch: {}
permissions:
  checks: write
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version: '1.26'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version: '1.26'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck -format text ./...
